<!-- @dsCard group="Type" viewport="700x180" name="Newsreader — serif display" subtitle="Editorial headings, page titles, hero display" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--bg); font-family: var(--font-serif); color: var(--text); }
  .big { font-size: 40px; font-weight: 500; letter-spacing: -0.015em; line-height: 1.1; }
  .big em { font-style: italic; color: var(--accent-deep); }
  .sub { font-size: 19px; font-weight: 500; letter-spacing: -0.01em; margin-top: 10px; color: var(--text-2); }
  .meta { font-family: var(--font-sans); font-size: 11px; color: var(--text-3); margin-top: 14px; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="big">Prepare for something <em>important</em>.</div>
  <div class="sub">Newsreader · optical sizing · 400 / 500 / 600 + italic</div>
  <div class="meta">--font-serif · used for display, page & section headings, stat values</div>
</body>
</html>
