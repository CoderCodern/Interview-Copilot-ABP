<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation — warm shadows" subtitle="Espresso-tinted, layered. Plus the top inset highlight." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 26px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 22px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 96px; height: 64px; background: var(--surface-raised); border: 1px solid var(--border);
         border-radius: var(--radius-lg); }
  .lab { font-size: 10.5px; color: var(--text-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lab">xs</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm), var(--inset-line)"></div><span class="lab">sm + inset</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md), var(--inset-line)"></div><span class="lab">md</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg), var(--inset-line)"></div><span class="lab">lg</span></div>
  </div>
</body>
</html>
