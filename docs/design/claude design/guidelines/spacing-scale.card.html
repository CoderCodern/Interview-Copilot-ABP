<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base · roomy, editorial rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--accent); border-radius: 3px; width: 100%; }
  .box { width: 30px; display: flex; align-items: flex-end; }
  .lab { font-size: 10px; color: var(--text-3); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="height:8px"><div class="bar" style="height:8px"></div></div><span class="lab">2 · 8</span></div>
    <div class="col"><div class="box" style="height:12px"><div class="bar" style="height:12px"></div></div><span class="lab">3 · 12</span></div>
    <div class="col"><div class="box" style="height:16px"><div class="bar" style="height:16px"></div></div><span class="lab">4 · 16</span></div>
    <div class="col"><div class="box" style="height:20px"><div class="bar" style="height:20px"></div></div><span class="lab">5 · 20</span></div>
    <div class="col"><div class="box" style="height:24px"><div class="bar" style="height:24px"></div></div><span class="lab">6 · 24</span></div>
    <div class="col"><div class="box" style="height:32px"><div class="bar" style="height:32px"></div></div><span class="lab">8 · 32</span></div>
    <div class="col"><div class="box" style="height:48px"><div class="bar" style="height:48px"></div></div><span class="lab">12 · 48</span></div>
    <div class="col"><div class="box" style="height:64px"><div class="bar" style="height:64px"></div></div><span class="lab">16 · 64</span></div>
  </div>
</body>
</html>
