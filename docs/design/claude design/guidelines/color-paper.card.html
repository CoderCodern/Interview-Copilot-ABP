<!-- @dsCard group="Colors" viewport="700x150" name="Paper neutrals (light)" subtitle="Off-white surfaces, borders & tracks for light mode" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); height: 76px; border: 1px solid var(--border);
        display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw b { font-size: 10.5px; font-weight: 600; color: var(--text); }
  .sw span { font-size: 10px; color: var(--text-3); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--paper-0)"><b>paper-0</b><span>#FFFFFE</span></div>
    <div class="sw" style="background:var(--paper-50)"><b>paper-50</b><span>#FDFCF9</span></div>
    <div class="sw" style="background:var(--paper-100)"><b>paper-100</b><span>#FAF9F6</span></div>
    <div class="sw" style="background:var(--paper-150)"><b>paper-150</b><span>#F6F2ED</span></div>
    <div class="sw" style="background:var(--paper-200)"><b>paper-200</b><span>#ECE7DF</span></div>
    <div class="sw" style="background:var(--paper-300)"><b>paper-300</b><span>#E6E0D8</span></div>
    <div class="sw" style="background:var(--paper-400)"><b>paper-400</b><span>#D8D0C4</span></div>
  </div>
</body>
</html>
