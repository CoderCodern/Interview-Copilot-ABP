<!-- @dsCard group="Spacing" viewport="700x160" name="Radii" subtitle="Gently rounded — xs 6px to pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--surface); border: 1px solid var(--border-strong);
         box-shadow: var(--shadow-sm); }
  .lab { font-size: 10.5px; color: var(--text-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lab">xs · 6</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm · 8</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md · 10</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">lg · 12</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lab">xl · 14</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="lab">2xl · 16</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="lab">pill</span></div>
  </div>
</body>
</html>
