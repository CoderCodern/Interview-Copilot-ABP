<!-- @dsCard group="Colors" viewport="700x150" name="Espresso neutrals (dark)" subtitle="Warm charcoal-brown ground & surfaces for dark mode" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); height: 76px; border: 1px solid var(--border);
        display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw b { font-size: 10px; font-weight: 600; color: var(--ink-100); }
  .sw span { font-size: 9.5px; color: var(--text-3); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--espresso-900)"><b>espresso-900</b><span>#2A251F</span></div>
    <div class="sw" style="background:var(--espresso-700)"><b>espresso-700</b><span>#3D3732</span></div>
    <div class="sw" style="background:var(--espresso-600)"><b>espresso-600</b><span>#4A443E</span></div>
    <div class="sw" style="background:var(--espresso-500)"><b>espresso-500</b><span>#514B44</span></div>
    <div class="sw" style="background:var(--espresso-300)"><b>espresso-300</b><span>#655E57</span></div>
    <div class="sw" style="background:var(--clay-400)"><b style="color:#211C17">accent</b><span style="color:#211C17">#A38D75</span></div>
  </div>
</body>
</html>
