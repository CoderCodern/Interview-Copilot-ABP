<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="From micro-label to hero display" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 26px; background: var(--bg); color: var(--text); font-family: var(--font-sans); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .line:last-child { border-bottom: none; }
  .tok { width: 130px; font-size: 10.5px; color: var(--text-3); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .spec { font-family: var(--font-serif); font-weight: 500; letter-spacing: -0.01em; color: var(--text); }
  .sans { font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="line"><span class="tok">3xl · 32px</span><span class="spec" style="font-size:28px">Good morning, Coder</span></div>
  <div class="line"><span class="tok">2xl · 25px</span><span class="spec" style="font-size:23px">Payment ledgers &amp; retries</span></div>
  <div class="line"><span class="tok">xl · 19px</span><span class="spec" style="font-size:19px">Study tracks</span></div>
  <div class="line"><span class="tok">lg · 17px</span><span class="spec" style="font-size:17px">Upcoming sessions</span></div>
  <div class="line"><span class="tok">md · 14px</span><span class="sans" style="font-size:14px; color:var(--text-2)">Lede & prose body text</span></div>
  <div class="line"><span class="tok">base · 13.5px</span><span class="sans" style="font-size:13.5px">Default UI body</span></div>
  <div class="line"><span class="tok">xs · 11.5px</span><span class="sans" style="font-size:11.5px; color:var(--text-3)">Meta · captions</span></div>
</body>
</html>
