<!-- @dsCard group="Type" viewport="700x190" name="Inter — UI sans" subtitle="All interface text: labels, body, meta, buttons" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--bg); font-family: var(--font-sans); color: var(--text); }
  .eyebrow { font-size: 11.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
  .lede { font-size: 14px; line-height: 1.5; color: var(--text-2); margin: 8px 0 14px; max-width: 56ch; }
  .weights { display: flex; gap: 18px; }
  .w { font-size: 16px; }
  .w b { display: block; font-size: 10px; color: var(--text-3); font-weight: 500; margin-top: 2px; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="eyebrow">Today's focus</div>
  <div class="lede">Inter carries every interface surface — navigation, tables, forms, and metadata — at a calm, readable density.</div>
  <div class="weights">
    <div class="w" style="font-weight:400">Regular<b>400</b></div>
    <div class="w" style="font-weight:450">Book<b>450</b></div>
    <div class="w" style="font-weight:500">Medium<b>500</b></div>
    <div class="w" style="font-weight:550">Semi<b>550</b></div>
    <div class="w" style="font-weight:600">Bold<b>600</b></div>
  </div>
</body>
</html>
