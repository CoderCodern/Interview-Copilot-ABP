<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 24px; align-items: flex-start; }
  .toasts { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Dialog, Toast, Button } = window.InterviewCopilotDesignSystem_d59c8c;
    const Check = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>;
    function Demo() {
      const [open, setOpen] = React.useState(false);
      return (
        <div className="row">
          <div>
            <Button variant="secondary" onClick={()=>setOpen(true)}>Open dialog</Button>
            <Dialog open={open} onClose={()=>setOpen(false)}
              title="Start a mock interview?"
              description="We'll run a 30-minute system-design session with the Stripe persona and generate feedback afterward."
              footer={<><Button variant="ghost" size="sm" onClick={()=>setOpen(false)}>Cancel</Button><Button variant="primary" size="sm" onClick={()=>setOpen(false)}>Start session</Button></>}
            />
          </div>
          <div className="toasts">
            <Toast tone="success" icon={<Check/>} title="Resume parsed" message="12 skills and 4 roles extracted." onDismiss={()=>{}} />
            <Toast tone="accent" title="Plan updated" message="Day 9 marked complete — 64% overall." onDismiss={()=>{}} />
            <Toast tone="warning" title="Re-analysis needed" message="The job description changed since last run." onDismiss={()=>{}} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
