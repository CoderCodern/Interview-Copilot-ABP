<!-- @dsCard group="Components" viewport="700x360" name="Forms — Inputs, Select, Checkbox, Switch" subtitle="Calm fields with a clay focus ring" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--bg); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Textarea, Select, Checkbox, Switch } = window.InterviewCopilotDesignSystem_d59c8c;
    const Search = () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;
    function Demo() {
      const [dark, setDark] = React.useState(false);
      const [c1, setC1] = React.useState(true);
      const [c2, setC2] = React.useState(false);
      return (
        <div className="grid">
          <div className="stack">
            <Input label="Target role" placeholder="Senior Backend Engineer" icon={<Search/>} />
            <Select label="Difficulty" defaultValue="Mixed">
              <option>Mixed</option><option>Medium</option><option>Hard</option>
            </Select>
            <Input label="Email" value="coder@example.com" error="That domain isn't verified yet" />
          </div>
          <div className="stack">
            <Textarea label="Paste job description" rows={4} placeholder="Paste the JD here — we'll extract requirements…" />
            <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
              <Checkbox checked={c1} onChange={()=>setC1(!c1)} label="Behavioral questions" />
              <Checkbox checked={c2} onChange={()=>setC2(!c2)} label="System design questions" />
              <Switch checked={dark} onChange={setDark} label="Evening mode" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
