<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--bg); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 260px 1fr; gap: 30px; align-items: start; }
  .sidebar { padding-left: 17px; display: flex; flex-direction: column; gap: 3px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { NavItem, Tabs } = window.InterviewCopilotDesignSystem_d59c8c;
    const I = (d) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
    function Demo() {
      const [nav, setNav] = React.useState('resume');
      const [tab, setTab] = React.useState('requirements');
      return (
        <div className="grid">
          <div className="sidebar">
            <NavItem active={nav==='dash'} onClick={()=>setNav('dash')} icon={I(<><path d="M3 12l9-8 9 8"/><path d="M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9"/></>)}>Dashboard</NavItem>
            <NavItem active={nav==='resume'} onClick={()=>setNav('resume')} icon={I(<><path d="M14 3v5h5"/><path d="M7 3h8l5 5v11a2 2 0 01-2 2H7a2 2 0 01-2-2V5a2 2 0 012-2z"/></>)}>Resume</NavItem>
            <NavItem active={nav==='jd'} onClick={()=>setNav('jd')} count={4} icon={I(<><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9h10M7 13h7"/></>)}>Job Descriptions</NavItem>
            <NavItem active={nav==='mock'} onClick={()=>setNav('mock')} icon={I(<><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></>)}>Mock Interviews</NavItem>
          </div>
          <div>
            <Tabs value={tab} onChange={setTab} items={[
              {id:'requirements', label:'Requirements', count:12},
              {id:'skillgap', label:'Skill gap'},
              {id:'questions', label:'Questions', count:24},
            ]} />
            <p style={{fontSize:'13px', color:'var(--text-2)', marginTop:'16px', lineHeight:1.6}}>
              Selected: <b style={{color:'var(--text)'}}>{tab}</b>. Tabs are underline-style and controlled; the sidebar row raises its surface with a clay edge marker when active.
            </p>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
