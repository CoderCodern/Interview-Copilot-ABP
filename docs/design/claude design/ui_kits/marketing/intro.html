<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainframe® — Intro</title>

<!-- Fonts (exactly as specified) -->
<link rel="stylesheet" href="https://db.onlinewebfonts.com/c/5ac3fe7c6abd2f62067f266d89671492?family=HelveticaNowDisplay-Medium">
<link rel="stylesheet" href="https://db.onlinewebfonts.com/c/1aa3377e489837a26d019bba501e779d?family=HelveticaNowDisplayW01-Rg">

<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --font-heading: 'HelveticaNowDisplay-Medium', 'Helvetica Neue', Arial, sans-serif;
    --font-body: 'HelveticaNowDisplayW01-Rg', 'Helvetica Neue', Arial, sans-serif;
  }
  html, body { margin: 0; }
  body {
    font-family: var(--font-body);
    /* Fallback ground if the background video can't load — keeps black
       hero text legible while staying neutral. */
    background: #c9c3b7;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .blink-cursor { animation: blink 1s step-end infinite; }
  .scrub-video { background: linear-gradient(105deg, #d8d3c8 0%, #bdb7ab 55%, #8f897e 100%); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* Typewriter hook — reveals one character at a time after a start delay. */
function useTypewriter(text, speed = 38, startDelay = 600) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);
  useEffect(() => {
    let i = 0, interval;
    const t = setTimeout(() => {
      interval = setInterval(() => {
        i++;
        setDisplayed(text.slice(0, i));
        if (i >= text.length) { clearInterval(interval); setDone(true); }
      }, speed);
    }, startDelay);
    return () => { clearTimeout(t); clearInterval(interval); };
  }, [text, speed, startDelay]);
  return { displayed, done };
}

const NAV_LINKS = ["Labs", "Studio", "Openings", "Shop"];
const PILLS = ["Pitch us an idea", "Come work here", "Send a brief hello", "See how we operate"];

function CopyIcon() {
  return (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2" />
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
    </svg>
  );
}

function ScrubVideo() {
  const videoRef = useRef(null);
  const s = useRef({ prevX: null, targetTime: 0, seeking: false });
  const SENSITIVITY = 0.8;

  useEffect(() => {
    const v = videoRef.current;
    function onMove(e) {
      if (!v || !v.duration || isNaN(v.duration)) { s.current.prevX = e.clientX; return; }
      if (s.current.prevX == null) { s.current.prevX = e.clientX; return; }
      const delta = e.clientX - s.current.prevX;
      s.current.prevX = e.clientX;
      let target = s.current.targetTime + (delta / window.innerWidth) * SENSITIVITY * v.duration;
      target = Math.max(0, Math.min(v.duration, target));
      s.current.targetTime = target;
      if (!s.current.seeking) { s.current.seeking = true; v.currentTime = target; }
    }
    function onSeeked() {
      if (!v) return;
      if (Math.abs(v.currentTime - s.current.targetTime) > 0.01) {
        v.currentTime = s.current.targetTime;
      } else {
        s.current.seeking = false;
      }
    }
    window.addEventListener("mousemove", onMove);
    if (v) v.addEventListener("seeked", onSeeked);
    return () => {
      window.removeEventListener("mousemove", onMove);
      if (v) v.removeEventListener("seeked", onSeeked);
    };
  }, []);

  return (
    <video
      ref={videoRef}
      className="scrub-video"
      style={{ position: "fixed", inset: 0, width: "100%", height: "100%", zIndex: 0, objectFit: "cover", objectPosition: "70% center" }}
      muted
      playsInline
      preload="auto"
      src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260530_042513_df96a13b-6155-4f6e-8b93-c9dee66fba08.mp4"
    />
  );
}

function Navbar() {
  const [open, setOpen] = useState(false);
  return (
    <>
      <nav className="fixed top-0 left-0 right-0 z-10 flex justify-between items-center px-5 sm:px-8 py-4 sm:py-5">
        {/* Logo */}
        <div className="flex items-center gap-3">
          <span className="text-[21px] sm:text-[26px] tracking-tight text-black" style={{ fontFamily: "var(--font-heading)" }}>Mainframe®</span>
          <span className="text-[25px] sm:text-[30px] text-black select-none" style={{ letterSpacing: "-0.02em" }}>✳︎</span>
        </div>

        {/* Desktop nav links */}
        <div className="hidden md:flex text-[23px] text-black">
          {NAV_LINKS.map((l, i) => (
            <React.Fragment key={l}>
              <a href="#" className="hover:opacity-60 transition-opacity">{l}</a>
              {i < NAV_LINKS.length - 1 && <span>,&nbsp;</span>}
            </React.Fragment>
          ))}
        </div>

        {/* Desktop CTA */}
        <a href="#" className="hidden md:inline text-[23px] text-black underline underline-offset-2 hover:opacity-60 transition-opacity">Get in touch</a>

        {/* Mobile hamburger */}
        <button className="md:hidden flex flex-col gap-[5px]" onClick={() => setOpen(!open)} aria-label="Menu">
          <span className="w-6 h-[2px] bg-black transition-all duration-300" style={open ? { transform: "translateY(7px) rotate(45deg)" } : {}} />
          <span className="w-6 h-[2px] bg-black transition-all duration-300" style={open ? { opacity: 0 } : {}} />
          <span className="w-6 h-[2px] bg-black transition-all duration-300" style={open ? { transform: "translateY(-7px) rotate(-45deg)" } : {}} />
        </button>
      </nav>

      {/* Mobile overlay */}
      <div
        className="md:hidden fixed inset-0 z-[9] bg-white/95 backdrop-blur-sm flex flex-col justify-center items-start px-8 gap-8 transition-opacity duration-300"
        style={{ opacity: open ? 1 : 0, pointerEvents: open ? "auto" : "none" }}
      >
        {NAV_LINKS.map((l) => (
          <a key={l} href="#" className="text-[32px] font-medium text-black" onClick={() => setOpen(false)}>{l}</a>
        ))}
        <a href="#" className="text-[32px] font-medium text-black underline underline-offset-2" onClick={() => setOpen(false)}>Get in touch</a>
      </div>
    </>
  );
}

function Hero() {
  const { displayed, done } = useTypewriter("Glad you stopped in. Good taste tends to find us. Now, what are we building?");
  const [pillsVisible, setPillsVisible] = useState(false);
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setPillsVisible(true), 400);
    return () => clearTimeout(t);
  }, []);

  const copy = () => {
    if (navigator.clipboard) navigator.clipboard.writeText("hello@mainframe.co");
    setCopied(true);
    setTimeout(() => setCopied(false), 1400);
  };

  const pillBase = "inline-flex items-center justify-center rounded-full px-4 sm:px-5 py-[0.3em] mx-[0.2em] mb-[0.4em] whitespace-nowrap";

  return (
    <section className="relative z-[1] h-screen flex flex-col justify-end pb-12 md:justify-center md:pb-0 px-5 sm:px-8 md:px-10 overflow-hidden">
      <div className="max-w-xl relative z-10">
        {/* Blurred intro label */}
        <div
          className="pointer-events-none select-none mb-5 sm:mb-6"
          style={{ fontSize: "clamp(18px, 4vw, 26px)", lineHeight: 1.3, fontWeight: 400, color: "#000", filter: "blur(4px)" }}
        >
          Hey there, meet A.R.I.A,<br />Mainframe's Adaptive Response Interface Agent
        </div>

        {/* Typewriter */}
        <p
          className="mb-5 sm:mb-6 text-black"
          style={{ fontSize: "clamp(18px, 4vw, 26px)", lineHeight: 1.35, fontWeight: 400, minHeight: "54px" }}
        >
          {displayed}
          {!done && <span className="blink-cursor inline-block w-[2px] h-[1.1em] bg-black align-middle ml-[2px]" />}
        </p>

        {/* Action pills */}
        <div
          className="flex flex-wrap gap-y-1"
          style={{ opacity: pillsVisible ? 1 : 0, transform: pillsVisible ? "translateY(0)" : "translateY(8px)", transition: "opacity 0.4s ease, transform 0.4s ease" }}
        >
          {PILLS.map((label) => (
            <button key={label} className={pillBase + " bg-white text-black border border-black/10 text-[13px] sm:text-[15px] hover:bg-black hover:text-white transition-colors duration-200"}>
              {label}
            </button>
          ))}
          <button
            onClick={copy}
            className={pillBase + " gap-2 sm:gap-3 bg-transparent text-white border border-white text-[13px] sm:text-[15px] hover:bg-white hover:text-black transition-colors duration-200"}
          >
            <span>Reach us: <span className="underline underline-offset-1">hello@mainframe.co</span></span>
            <CopyIcon />
          </button>
        </div>
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <ScrubVideo />
      <Navbar />
      <Hero />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
